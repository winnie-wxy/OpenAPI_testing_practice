name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: >-
          pytest -m smoke
          -n auto
          --reruns 2
          --junitxml=reports/smoke-results.xml
          --html=reports/smoke.html --self-contained-html
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Smoke Test Results
          path: reports/smoke-results.xml
          reporter: java-junit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/

  regression:
    name: Regression Tests
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: >-
          pytest -m "regression or contract"
          -n auto
          --reruns 2
          --junitxml=reports/regression-results.xml
          --html=reports/regression.html --self-contained-html
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Regression Test Results
          path: reports/regression-results.xml
          reporter: java-junit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: reports/

  nonfunctional:
    name: Non-Functional Tests
    needs: regression
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - run: >-
          pytest -m nonfunctional
          --reruns 2
          --junitxml=reports/nonfunctional-results.xml
          --html=reports/nonfunctional.html --self-contained-html
      - uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Non-Functional Test Results
          path: reports/nonfunctional-results.xml
          reporter: java-junit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nonfunctional-report
          path: reports/

  test-results:
    name: Publish Test Results
    needs: [smoke, regression, nonfunctional]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "*-report"
          merge-multiple: true
          path: reports/
      - uses: EnricoMi/publish-unit-test-result-action@v2
        with:
          files: reports/*-results.xml
          comment_title: "Test Results Summary"
          check_name: "Test Results"
