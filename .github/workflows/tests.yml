name: API Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    name: Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -m smoke --html=reports/smoke.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-report
          path: reports/

  regression:
    name: Regression Tests
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: pytest -m "regression or contract" --html=reports/regression.html --self-contained-html
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: regression-report
          path: reports/
